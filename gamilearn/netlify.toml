# Security headers for static SPA (see MDN Content-Security-Policy)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    # default-src + resource directives; unsafe-inline on style-src for React inline style={}
    # connect-src https: allows VITE_API_URL on any HTTPS backend; img-src https: for Unsplash/Picsum/avatars
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; font-src 'self' https: data:; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: https:; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' https: 'unsafe-inline'; connect-src 'self' https:; upgrade-insecure-requests"

# Single Page App fallback: serve index.html for all routes (200), enabling client-side routing
# Note: force = false allows Netlify to serve static files (JS, CSS, images) first
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false